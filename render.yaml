services:
  # The PostgreSQL Database
  - type: psql
    name: teenlink-db
    plan: free
    postgresMajorVersion: 15

  # The FastAPI Web Service
  - type: web
    name: teenlink-api
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: teenlink-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_HOURS
        value: 24
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: TeenLink
      - key: SMTP_USE_TLS
        value: true
      - key: SMTP_USE_SSL
        value: false
